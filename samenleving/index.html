<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia y Geografía — Samenleving</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0d1f3c;--navy2:#162d54;--navy3:#1e3a6e;
      --orange:#f47c3a;--cream:#fdf6ec;--green:#2ecc8a;
      --samenleving:#1a7a50;
      --border:rgba(255,255,255,0.07);--ease:0.22s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{-webkit-text-size-adjust:100%;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    
    .header{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 20px 18px;display:flex;flex-direction:column;align-items:center;position:sticky;top:0;z-index:100;}
    .header-top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .back-btn{background:none;border:none;color:var(--orange);font-size:22px;cursor:pointer;padding:0;line-height:1;}
    .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--samenleving);margin-bottom:4px;}
    .logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--cream);letter-spacing:0.5px;line-height:1;flex:1;text-align:center;}
    .logo-nl{color:var(--orange);}
    
    .hero{background:linear-gradient(160deg,rgba(26,122,80,0.1),rgba(26,122,80,0.05));padding:20px;border-bottom:1px solid var(--border);text-align:center;}
    .hero-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--samenleving);margin-bottom:8px;}
    .hero-sub{font-size:14px;color:rgba(253,246,236,0.6);line-height:1.5;}
    
    .lessons-section{background:var(--cream);padding:20px;min-height:calc(100vh - 200px);}
    .lessons-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
    .lesson-card{background:white;border:1.5px solid rgba(26,122,80,0.15);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;text-align:center;transition:all var(--ease);position:relative;}
    .lesson-card:hover{border-color:var(--samenleving);box-shadow:0 8px 24px rgba(26,122,80,0.15);transform:translateY(-2px);}
    .lesson-card.locked{opacity:0.45;cursor:not-allowed;}
    .lesson-card.locked:hover{border-color:rgba(26,122,80,0.15);box-shadow:none;transform:none;}
    .lesson-emoji{font-size:32px;line-height:1;}
    .lesson-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--navy);line-height:1.2;}
    .lesson-code{font-size:11px;font-weight:600;color:var(--samenleving);}
    .progress-bar{width:100%;height:4px;background:rgba(26,122,80,0.1);border-radius:99px;overflow:hidden;margin-top:8px;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--samenleving),#2ecc8a);width:0%;transition:width 0.6s ease;border-radius:99px;}
    .lock-badge{position:absolute;top:8px;right:8px;font-size:12px;background:rgba(232,69,90,0.1);padding:2px 6px;border-radius:4px;}
    
    .footer{background:var(--navy2);padding:20px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:rgba(253,246,236,0.4);}
    
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy3);border:1px solid rgba(255,255,255,0.12);color:var(--cream);font-size:13px;font-weight:600;padding:12px 20px;border-radius:99px;z-index:9999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s;opacity:0;white-space:nowrap;max-width:90vw;text-align:center;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="goBack()">←</button>
    <div></div>
  </div>
  <div class="section-label">🏛️ Samenleving</div>
  <div class="logo-text">Slaag<span class="logo-nl">NL</span></div>
</div>

<div class="hero">
  <h1 class="hero-title">Historia y Geografía</h1>
  <p class="hero-sub">Aprende sobre los Países Bajos, su historia, geografía y política</p>
</div>

<div class="lessons-section">
  <div class="lessons-grid" id="lessons-grid"></div>
</div>

<div class="footer">
  <p>🏛️ Módulo Historia y Geografía — Samenleving</p>
</div>

<div class="toast" id="toast"></div>

<script>
const LESSONS = [
  {id:'les-1', title:'Geografía', emoji:'🗺️', code:'1/6', url:'les-1.html', ready:true},
  {id:'les-2', title:'Política', emoji:'🏛️', code:'2/6', url:'les-2.html', ready:false},
  {id:'les-3', title:'Constitución', emoji:'📜', code:'3/6', url:'les-3.html', ready:false},
  {id:'les-4', title:'WWII', emoji:'⚔️', code:'4/6', url:'les-4.html', ready:false},
  {id:'les-5', title:'VOC/Imperio', emoji:'⛵', code:'5/6', url:'les-5.html', ready:false},
  {id:'les-6', title:'UE', emoji:'🇪🇺', code:'6/6', url:'les-6.html', ready:false}
];

const state = {mastery:JSON.parse(localStorage.getItem('slaagnl_mastery')||'{}')};

function modPct(id){return state.mastery[id]??0;}

function renderLessons(){
  const grid=document.getElementById('lessons-grid');
  grid.innerHTML=LESSONS.map((les,i)=>{
    const pct=modPct(les.id);
    const isLocked=!les.ready;
    return `<div class="lesson-card${isLocked?' locked':''}" onclick="handleClick('${les.id}',${isLocked})">
      ${isLocked?'<div class="lock-badge">🔒</div>':''}
      <div class="lesson-emoji">${les.emoji}</div>
      <div class="lesson-title">${les.title}</div>
      <div class="lesson-code">Lección ${les.code}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function handleClick(lessonId,isLocked){
  if(isLocked){showToast('Esta lección aún no está disponible 📖');return;}
  const les=LESSONS.find(l=>l.id===lessonId);
  if(les&&les.url)window.location.href=les.url;
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function goBack(){window.history.back();}

window.addEventListener('DOMContentLoaded',renderLessons);
</script>

</body>
</html>
