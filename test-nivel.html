<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlaagNL – Test de nivel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1f3c; --navy2:#162d54; --navy3:#1e3a6e;
  --orange:#f47c3a; --cream:#fdf6ec; --green:#2ecc8a;
  --red:#e8455a; --border:rgba(255,255,255,0.08); --ease:0.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ══ TOPBAR ══ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--navy2);border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--cream);}
.logo span{color:var(--orange);}
.back-link{color:rgba(253,246,236,0.45);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px;transition:color var(--ease);}
.back-link:hover{color:var(--cream);}
.q-counter{font-size:13px;font-weight:700;color:rgba(253,246,236,0.5);}

/* ══ PROGRESS BAR ══ */
.progress-wrap{height:4px;background:rgba(255,255,255,0.07);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),#f4c842);border-radius:0 4px 4px 0;transition:width 0.4s ease;}

/* ══ SCREEN ══ */
.screen{display:none;min-height:calc(100vh - 57px);flex-direction:column;}
.screen.active{display:flex;}
.screen-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 48px;text-align:center;}

/* ══ EXAM TYPE SCREEN ══ */
.et-lowie{width:90px;height:90px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 8px 20px rgba(244,124,58,0.3));animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.et-title{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,30px);font-weight:900;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.et-sub{font-size:14px;color:rgba(253,246,236,0.5);margin-bottom:28px;line-height:1.5;max-width:340px;}

.et-btn{width:100%;max-width:420px;display:flex;align-items:center;gap:16px;background:var(--navy2);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:18px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;margin-bottom:12px;transition:all 0.22s;position:relative;overflow:hidden;}
.et-btn:not(.et-disabled):hover{border-color:var(--orange);background:rgba(244,124,58,0.08);transform:translateY(-1px);}
.et-btn:not(.et-disabled):active{transform:scale(0.98);}
.et-disabled{opacity:0.45;cursor:not-allowed;}
.et-disabled:hover{transform:none!important;}
.et-icon{font-size:32px;flex-shrink:0;width:44px;text-align:center;}
.et-content{flex:1;}
.et-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--cream);margin-bottom:3px;}
.et-desc{font-size:12px;color:rgba(253,246,236,0.45);line-height:1.4;}
.et-arrow{font-size:22px;color:var(--orange);flex-shrink:0;}
.et-badge{position:absolute;top:12px;right:14px;background:rgba(244,124,58,0.2);border:1px solid rgba(244,124,58,0.35);color:var(--orange);font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;}
[dir="rtl"] .et-badge{right:auto;left:14px;}
[dir="rtl"] .et-btn{text-align:right;}
[dir="rtl"] .et-arrow{transform:scaleX(-1);}

.back-to-index{margin-top:8px;font-size:13px;color:rgba(253,246,236,0.3);cursor:pointer;text-decoration:none;display:inline-block;transition:color var(--ease);}
.back-to-index:hover{color:rgba(253,246,236,0.6);}

/* ══ TEST QUESTION SCREEN ══ */
.dutch-display{background:linear-gradient(135deg,var(--navy2),var(--navy3));border:1px solid rgba(244,124,58,0.25);border-radius:20px;padding:20px 28px;margin-bottom:20px;max-width:420px;width:100%;}
.dutch-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(253,246,236,0.35);margin-bottom:6px;}
.dutch-word{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,32px);font-weight:900;color:var(--orange);line-height:1.2;}
.dutch-phrase{font-family:'Playfair Display',serif;font-size:clamp(16px,4vw,22px);font-weight:700;color:var(--orange);line-height:1.3;}

.q-text{font-size:clamp(14px,3.5vw,17px);color:rgba(253,246,236,0.75);margin-bottom:20px;max-width:380px;line-height:1.5;}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px;}
.opt-btn{background:var(--navy2);border:2px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--cream);cursor:pointer;text-align:center;transition:all 0.18s;line-height:1.3;}
.opt-btn:hover:not(.answered){border-color:rgba(244,124,58,0.5);background:rgba(244,124,58,0.06);}
.opt-btn:active:not(.answered){transform:scale(0.97);}
.opt-btn.correct{background:rgba(46,204,138,0.12);border-color:var(--green);color:var(--green);}
.opt-btn.wrong{background:rgba(232,69,90,0.1);border-color:var(--red);color:var(--red);}
.opt-btn.answered{cursor:default;}

.next-btn{margin-top:20px;padding:13px 32px;background:linear-gradient(135deg,var(--orange),#f4a020);border:none;border-radius:12px;color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:none;transition:all var(--ease);box-shadow:0 4px 16px rgba(244,124,58,0.3);}
.next-btn.show{display:inline-block;}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,124,58,0.4);}

/* ══ RESULTS SCREEN ══ */
.result-lowie{width:100px;height:100px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 8px 24px rgba(244,124,58,0.35));}
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 16px;background:linear-gradient(135deg,rgba(244,124,58,0.12),rgba(244,196,66,0.08));border:3px solid rgba(244,124,58,0.3);}
.score-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--orange);line-height:1;}
.score-denom{font-size:12px;color:rgba(253,246,236,0.4);font-weight:600;}
.level-badge{display:inline-block;padding:6px 18px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:12px;margin-top:4px;}
.level-beginner{background:rgba(244,124,58,0.12);border:1px solid rgba(244,124,58,0.3);color:var(--orange);}
.level-basic{background:rgba(244,196,66,0.1);border:1px solid rgba(244,196,66,0.3);color:#f4c842;}
.level-intermediate{background:rgba(46,204,138,0.1);border:1px solid rgba(46,204,138,0.3);color:var(--green);}
.level-advanced{background:rgba(96,176,244,0.1);border:1px solid rgba(96,176,244,0.3);color:#60b0f4;}

.result-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,26px);font-weight:900;color:var(--cream);margin-bottom:8px;max-width:340px;}
.result-msg{font-size:14px;color:rgba(253,246,236,0.5);line-height:1.6;max-width:320px;margin-bottom:28px;}
.result-msg strong{color:var(--cream);}

.go-btn{display:inline-block;padding:15px 32px;background:linear-gradient(135deg,var(--orange),#f4a020);border:none;border-radius:14px;color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 6px 20px rgba(244,124,58,0.35);transition:all 0.22s;}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,124,58,0.45);}

.result-answers{width:100%;max-width:420px;margin:0 auto 24px;text-align:left;}
.result-answers-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(253,246,236,0.3);margin-bottom:10px;text-align:center;}
.result-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.result-row:last-child{border-bottom:none;}
.result-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.result-q{font-size:12px;color:rgba(253,246,236,0.5);flex:1;line-height:1.3;}
.result-q strong{color:var(--cream);}

/* ══ AUTH SCREEN ══ */
.auth-lowie{width:70px;height:70px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 6px 16px rgba(244,124,58,0.3));}
.auth-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,26px);font-weight:900;color:var(--cream);margin-bottom:6px;line-height:1.2;}
.auth-sub{font-size:13px;color:rgba(253,246,236,0.45);margin-bottom:24px;line-height:1.5;max-width:320px;}
.auth-tabs{display:flex;gap:0;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;margin-bottom:22px;width:100%;max-width:360px;}
.auth-tab{flex:1;padding:10px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:rgba(253,246,236,0.4);cursor:pointer;transition:all var(--ease);}
.auth-tab.active{background:rgba(244,124,58,0.15);color:var(--orange);}
.auth-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
.auth-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--cream);outline:none;transition:border-color var(--ease);}
.auth-input:focus{border-color:rgba(244,124,58,0.5);background:rgba(244,124,58,0.04);}
.auth-input::placeholder{color:rgba(253,246,236,0.25);}
.auth-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--orange),#f4a020);border:none;border-radius:12px;color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(244,124,58,0.3);transition:all var(--ease);}
.auth-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(244,124,58,0.4);}
.auth-skip{margin-top:12px;font-size:12px;color:rgba(253,246,236,0.25);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;transition:color var(--ease);}
.auth-skip:hover{color:rgba(253,246,236,0.5);}
.auth-err{font-size:12px;color:#e8455a;display:none;text-align:center;padding:4px 0;}
.auth-err.show{display:block;}
</style>
</head>
<body>

<!-- SCREEN 1: EXAM TYPE -->
<div id="screen-type" class="screen active">
  <div class="topbar">
    <a class="back-link" href="index.html" id="back-text">‹ <span id="back-label"></span></a>
    <div class="logo">Slaag<span>NL</span></div>
    <div style="width:60px"></div>
  </div>
  <div class="screen-body">
    <img class="et-lowie" src="assets/lowie.png" alt="Lowie">
    <h1 class="et-title" id="et-title"></h1>
    <p class="et-sub" id="et-sub"></p>
    <button class="et-btn" onclick="selectExamType('mvv')">
      <div class="et-icon">🛂</div>
      <div class="et-content">
        <div class="et-name" id="et-name1"></div>
        <div class="et-desc" id="et-desc1"></div>
      </div>
      <div class="et-arrow">›</div>
    </button>
    <button class="et-btn et-disabled" disabled>
      <div class="et-icon">🏛️</div>
      <div class="et-content">
        <div class="et-name" id="et-name2"></div>
        <div class="et-desc" id="et-desc2"></div>
      </div>
      <div class="et-badge" id="et-soon"></div>
    </button>
  </div>
</div>

<!-- SCREEN 2: TEST QUESTIONS -->
<div id="screen-test" class="screen">
  <div class="topbar">
    <button class="back-link" onclick="showScreen('screen-type')" style="background:none;border:none;cursor:pointer;">‹ <span id="q-back-label"></span></button>
    <div class="logo">Slaag<span>NL</span></div>
    <div class="q-counter" id="q-counter">1/10</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="screen-body">
    <div class="dutch-display" id="dutch-display">
      <div class="dutch-tag" id="dutch-tag"></div>
      <div id="dutch-content"></div>
    </div>
    <p class="q-text" id="q-text"></p>
    <div class="options-grid" id="options-grid"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>
</div>

<!-- SCREEN 3: RESULTS -->
<div id="screen-results" class="screen">
  <div class="topbar">
    <div style="width:60px"></div>
    <div class="logo">Slaag<span>NL</span></div>
    <div style="width:60px"></div>
  </div>
  <div class="screen-body">
    <img class="result-lowie" src="assets/lowie.png" alt="Lowie" id="result-lowie">
    <div class="score-ring">
      <div class="score-num" id="score-num">0</div>
      <div class="score-denom" id="score-denom">/10</div>
    </div>
    <div class="level-badge" id="level-badge"></div>
    <h2 class="result-title" id="result-title"></h2>
    <p class="result-msg" id="result-msg"></p>
    <div class="result-answers" id="result-answers"></div>
    <button class="go-btn" onclick="showAuth()" id="go-btn"></button>
  </div>
</div>

<!-- SCREEN 4: AUTH -->
<div id="screen-auth" class="screen">
  <div class="topbar">
    <button class="back-link" onclick="showScreen('screen-results')" style="background:none;border:none;cursor:pointer;">‹ <span id="auth-back-label"></span></button>
    <div class="logo">Slaag<span>NL</span></div>
    <div style="width:80px"></div>
  </div>
  <div class="screen-body">
    <img class="auth-lowie" src="assets/lowie.png" alt="Lowie">
    <h2 class="auth-title" id="auth-title"></h2>
    <p class="auth-sub" id="auth-sub"></p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-reg" onclick="switchAuthTab('reg')"></button>
      <button class="auth-tab" id="tab-log" onclick="switchAuthTab('log')"></button>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="form-reg">
      <input class="auth-input" type="text" id="a-reg-name" autocomplete="name">
      <input class="auth-input" type="email" id="a-reg-email" autocomplete="email">
      <input class="auth-input" type="password" id="a-reg-pass" autocomplete="new-password">
      <div class="auth-err" id="err-reg"></div>
      <button class="auth-submit" id="reg-submit-btn" onclick="doRegisterTest()"></button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form" id="form-log" style="display:none">
      <input class="auth-input" type="email" id="a-log-email" autocomplete="email">
      <input class="auth-input" type="password" id="a-log-pass" autocomplete="current-password">
      <div class="auth-err" id="err-log"></div>
      <button class="auth-submit" id="log-submit-btn" onclick="doLoginTest()"></button>
    </div>

    <button class="auth-skip" id="auth-skip-btn" onclick="goDashboard()"></button>
  </div>
</div>

// ══ QUESTIONS DATA ══
// dutch: shown as-is (always in Dutch)
// type: 'vocab' | 'grammar' | 'kns'
// opts_fixed: options same in all languages (null = use T[lang].opts[i])
// correct: 0-based index
const QUESTIONS = [
  { dutch:'goedemorgen', type:'vocab', correct:2 },
  { dutch:'Welk lidwoord hoort bij "boek"?', type:'grammar', opts_fixed:['de','het','een','den'], correct:1 },
  { dutch:'Ik heet…', type:'vocab', correct:2 },
  { dutch:null, type:'kns', opts_fixed:['~7 miljoen','~12 miljoen','~17 miljoen','~25 miljoen'], correct:2 },
  { dutch:'fiets', type:'vocab', correct:3 },
  { dutch:null, type:'kns', opts_fixed:['Amsterdam','Rotterdam','Den Haag','Utrecht'], correct:2 },
  { dutch:'Ik ___ student', type:'grammar', opts_fixed:['zijn','ben','heeft','is'], correct:1 },
  { dutch:'werken', type:'vocab', correct:3 },
  { dutch:null, type:'kns', opts_fixed:['1648','1789','1815','1900'], correct:2 },
  { dutch:'Spreek je Nederlands?', type:'vocab', correct:2 },
];

const t = T[lang] || T.es;
let examType = '';
let currentQ = 0;
let score = 0;
let userAnswers = [];

// ══ HELPERS ══
function setText(id, html, isHTML) {
  const el = document.getElementById(id);
  if (!el) return;
  if (isHTML) el.innerHTML = html; else el.textContent = html;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══ APPLY TRANSLATIONS ══
function applyLang() {
  setText('back-label', t.backLabel);
  setText('et-title', t.etTitle);
  setText('et-sub', t.etSub);
  setText('et-name1', t.etName1);
  setText('et-desc1', t.etDesc1);
  setText('et-name2', t.etName2);
  setText('et-desc2', t.etDesc2);
  setText('et-soon', t.etSoon);
  setText('q-back-label', t.qBackLabel);
}

// ══ EXAM TYPE SELECTION ══
function selectExamType(type) {
  examType = type;
  localStorage.setItem('slaagnl_exam_type', type);
  currentQ = 0;
  score = 0;
  userAnswers = [];
  renderQuestion();
  showScreen('screen-test');
}

// ══ QUESTION RENDERING ══
function getOpts(i) {
  const q = QUESTIONS[i];
  if (q.opts_fixed) return q.opts_fixed;
  return t.opts[i] || T.es.opts[i];
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const opts = getOpts(currentQ);
  const total = QUESTIONS.length;

  setText('q-counter', `${currentQ + 1}/${total}`);
  document.getElementById('progress-fill').style.width = ((currentQ) / total * 100) + '%';

  // Dutch display
  const tag = q.type === 'grammar' ? t.grammarTag : q.type === 'kns' ? t.knsTag : t.dutchTag;
  setText('dutch-tag', tag);

  const dutchContent = document.getElementById('dutch-content');
  if (q.dutch) {
    const cls = q.dutch.includes(' ') ? 'dutch-phrase' : 'dutch-word';
    dutchContent.innerHTML = `<div class="${cls}">${q.dutch}</div>`;
    document.getElementById('dutch-display').style.display = '';
  } else {
    document.getElementById('dutch-display').style.display = 'none';
  }

  setText('q-text', t.qTexts[currentQ]);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = opts.map((opt, i) =>
    `<button class="opt-btn" onclick="selectAnswer(${i})">${opt}</button>`
  ).join('');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('show');
  const isLast = currentQ === total - 1;
  nextBtn.textContent = isLast ? t.finishBtn : t.nextBtn;
}

function selectAnswer(idx) {
  if (document.querySelector('.opt-btn.answered')) return;
  const q = QUESTIONS[currentQ];
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;
  userAnswers.push({ q: currentQ, chosen: idx, correct: q.correct, ok: isCorrect });

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('answered');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ══ RESULTS ══
function showResults() {
  document.getElementById('progress-fill').style.width = '100%';

  // Save mastery based on score
  let mastery = { m0:0,m1:0,m2:0,m3:0,m4:0,m5:0,m6:0,m7:0, s1:0,s2:0,s3:0,s4:0,s5:0, sp1:0,sp2:0,sp3:0,sp4:0 };
  let levelIdx;
  if (score <= 3)      { levelIdx = 0; }
  else if (score <= 6) { levelIdx = 1; mastery.m0 = 100; }
  else if (score <= 8) { levelIdx = 2; mastery.m0 = 100; mastery.m1 = 80; }
  else                 { levelIdx = 3; mastery.m0 = 100; mastery.m1 = 100; mastery.m2 = 80; }

  localStorage.setItem('slaagnl_mastery', JSON.stringify(mastery));

  setText('score-num', score);
  setText('score-denom', '/10');

  const badge = document.getElementById('level-badge');
  badge.textContent = t.levels[levelIdx];
  badge.className = 'level-badge ' + ['level-beginner','level-basic','level-intermediate','level-advanced'][levelIdx];

  setText('result-title', t.levelTitles[levelIdx]);
  document.getElementById('result-msg').innerHTML = t.levelMsgs[levelIdx];
  setText('go-btn', t.goBtn);

  // Answer review
  const opts_all = QUESTIONS.map((q, i) => getOpts(i));
  const answersHTML = userAnswers.map((a) => {
    const q = QUESTIONS[a.q];
    const opts = opts_all[a.q];
    const qLabel = q.dutch ? `<strong>${q.dutch}</strong>` : `Q${a.q+1}`;
    return `<div class="result-row">
      <div class="result-icon">${a.ok ? '✅' : '❌'}</div>
      <div class="result-q">${qLabel} → ${opts[a.correct]}</div>
    </div>`;
  }).join('');
  document.getElementById('result-answers').innerHTML =
    `<div class="result-answers-title">${t.reviewTitle}</div>${answersHTML}`;

  showScreen('screen-results');
}

function goDashboard() {
  window.location.href = 'dashboard.html';
}

applyLang();
</script>
