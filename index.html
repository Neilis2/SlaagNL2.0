<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlaagNL – Inburgeringsexamen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1f3c; --navy2: #162d54; --navy3: #1e3a6e;
  --orange: #f47c3a; --orange2: #f4a36a;
  --cream: #fdf6ec; --green: #2ecc8a;
  --border: rgba(255,255,255,0.08); --ease: 0.2s ease;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

/* ══ TOPBAR ══ */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; position: sticky; top: 0; z-index: 100; background: rgba(13,31,60,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); gap: 12px; }
.topbar-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--cream); text-decoration: none; flex-shrink: 0; }
.topbar-logo span { color: var(--orange); }
.lang-selector { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
.lang-btn { background: none; border: 1.5px solid transparent; border-radius: 8px; font-size: 18px; cursor: pointer; padding: 4px 6px; line-height: 1; transition: all var(--ease); opacity: 0.45; }
.lang-btn.active { border-color: var(--orange); opacity: 1; background: rgba(244,124,58,0.1); }
.lang-btn:hover { opacity: 0.85; }
.topbar-login { background: none; border: 1.5px solid rgba(244,124,58,0.45); color: var(--orange); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 99px; cursor: pointer; transition: all var(--ease); text-decoration: none; white-space: nowrap; flex-shrink: 0; }
.topbar-login:hover { background: rgba(244,124,58,0.1); border-color: var(--orange); }

/* ══ HERO ══ */
.hero { min-height: calc(100vh - 57px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px 60px; text-align: center; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(244,124,58,0.14) 0%, transparent 70%), linear-gradient(180deg, var(--navy2) 0%, var(--navy) 100%); position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); width: 120%; height: 80px; background: var(--cream); border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
.hero-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(46,204,138,0.1); border: 1px solid rgba(46,204,138,0.3); border-radius: 99px; padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 24px; letter-spacing: 0.3px; }
.lowie-hero { width: 110px; height: 110px; object-fit: contain; filter: drop-shadow(0 12px 32px rgba(244,124,58,0.35)); margin-bottom: 16px; animation: floatLowie 4s ease-in-out infinite; }
@keyframes floatLowie { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.hero-title { font-family: 'Playfair Display', serif; font-size: clamp(30px, 8vw, 50px); font-weight: 900; line-height: 1.1; color: var(--cream); margin-bottom: 16px; max-width: 480px; }
.hero-title .accent { color: var(--orange); }
.hero-sub { font-size: clamp(14px, 3.5vw, 17px); color: rgba(253,246,236,0.6); line-height: 1.6; max-width: 360px; margin-bottom: 36px; }
.hero-cta-group { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 300px; }
.link-login { font-size: 13px; color: rgba(253,246,236,0.4); cursor: pointer; text-decoration: none; padding: 4px; transition: color var(--ease); }
.link-login:hover { color: rgba(253,246,236,0.75); }
.et-btn { width: 100%; display: flex; align-items: center; gap: 14px; background: var(--navy2); border: 2px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 16px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-align: left; margin-bottom: 10px; transition: all 0.22s; position: relative; }
.et-btn:not(.et-disabled):hover { border-color: var(--orange); background: rgba(244,124,58,0.08); transform: translateY(-1px); }
.et-btn:not(.et-disabled):active { transform: scale(0.98); }
.et-disabled { opacity: 0.42; cursor: not-allowed; }
.et-icon { font-size: 30px; flex-shrink: 0; }
.et-info { flex: 1; text-align: left; }
.et-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--cream); margin-bottom: 2px; }
.et-desc { font-size: 11.5px; color: rgba(253,246,236,0.4); line-height: 1.4; }
.et-arrow { font-size: 20px; color: var(--orange); flex-shrink: 0; }
.et-badge { position: absolute; top: 10px; right: 14px; background: rgba(244,124,58,0.15); border: 1px solid rgba(244,124,58,0.3); color: var(--orange); font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; }
[dir="rtl"] .et-badge { right: auto; left: 14px; }
[dir="rtl"] .et-info { text-align: right; }
.btn-primary { width: 100%; padding: 16px 28px; background: linear-gradient(135deg, var(--orange), #f4a020); border: none; border-radius: 16px; color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.22s; box-shadow: 0 8px 24px rgba(244,124,58,0.35); text-decoration: none; display: block; text-align: center; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(244,124,58,0.45); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { width: 100%; padding: 14px 28px; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.14); border-radius: 16px; color: rgba(253,246,236,0.7); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.22s; text-decoration: none; display: block; text-align: center; }
.btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--cream); border-color: rgba(255,255,255,0.25); }
.hero-note { margin-top: 14px; font-size: 11px; color: rgba(253,246,236,0.3); letter-spacing: 0.2px; }

/* ══ FEATURES ══ */
.features { background: var(--cream); padding: 56px 24px 48px; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: var(--orange); text-align: center; margin-bottom: 10px; }
.section-title { font-family: 'Playfair Display', serif; font-size: clamp(22px, 5vw, 30px); font-weight: 900; color: var(--navy); text-align: center; line-height: 1.2; margin-bottom: 32px; }
.features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 480px; margin: 0 auto; }
.feature-card { background: white; border: 1.5px solid rgba(13,31,60,0.07); border-radius: 20px; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 2px 12px rgba(13,31,60,0.06); transition: transform var(--ease), box-shadow var(--ease); }
.feature-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13,31,60,0.1); }
.feature-card.featured { background: linear-gradient(135deg, var(--navy2), var(--navy3)); border-color: rgba(244,124,58,0.3); grid-column: span 2; flex-direction: row; align-items: center; padding: 20px; }
.feature-emoji { font-size: 28px; line-height: 1; }
.feature-lowie { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
.feature-card.featured .feature-lowie { width: 50px; height: 50px; }
.feature-name { font-size: 13px; font-weight: 700; color: var(--navy); line-height: 1.3; }
.feature-card.featured .feature-name { color: var(--cream); font-size: 15px; }
.feature-desc { font-size: 11.5px; color: rgba(13,31,60,0.45); line-height: 1.4; }
.feature-card.featured .feature-desc { color: rgba(253,246,236,0.55); font-size: 12px; }
.feature-card.featured .feature-text { flex: 1; padding-left: 14px; }
[dir="rtl"] .feature-card.featured .feature-text { padding-left: 0; padding-right: 14px; }

/* ══ EXAM BAND ══ */
.sections-band { background: var(--navy2); padding: 48px 24px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.sections-band .section-label { color: var(--orange2); }
.sections-band .section-title { color: var(--cream); }
.exam-pills { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 32px; }
.exam-pill { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--cream); }
.exam-pill-emoji { font-size: 18px; }
.exam-pill-label { color: rgba(253,246,236,0.7); font-size: 11px; font-weight: 400; display: block; }
.stats-row { display: flex; justify-content: center; max-width: 360px; margin: 0 auto; background: rgba(244,124,58,0.07); border: 1px solid rgba(244,124,58,0.18); border-radius: 20px; overflow: hidden; }
.stat-item { flex: 1; padding: 18px 12px; text-align: center; border-right: 1px solid rgba(244,124,58,0.15); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--orange); display: block; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 10px; color: rgba(253,246,236,0.4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

/* ══ TESTIMONIALS ══ */
.testimonials { background: var(--cream); padding: 48px 24px 40px; }
.testimonials .section-title { color: var(--navy); }
.testimonial-list { display: flex; flex-direction: column; gap: 14px; max-width: 480px; margin: 0 auto; }
.testimonial-card { background: white; border: 1.5px solid rgba(13,31,60,0.07); border-radius: 18px; padding: 18px 18px 16px; box-shadow: 0 2px 10px rgba(13,31,60,0.05); }
.testimonial-stars { font-size: 13px; margin-bottom: 8px; letter-spacing: 1px; }
.testimonial-text { font-size: 13px; color: rgba(13,31,60,0.65); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
.testimonial-author { display: flex; align-items: center; gap: 10px; }
.testimonial-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.testimonial-name { font-size: 12px; font-weight: 700; color: var(--navy); }
.testimonial-origin { font-size: 11px; color: rgba(13,31,60,0.4); }

/* ══ PLANS ══ */
.plans-section { background: var(--navy); padding: 48px 24px 40px; }
.plans-section .section-title { color: var(--cream); }
.plans-grid { display: flex; flex-direction: column; gap: 12px; max-width: 420px; margin: 0 auto 28px; }
.plan-row { background: var(--navy2); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; transition: border-color var(--ease); position: relative; }
.plan-row:hover { border-color: rgba(244,124,58,0.3); }
.plan-row.highlighted { border-color: rgba(244,124,58,0.45); background: linear-gradient(135deg, rgba(30,58,110,0.9), rgba(22,45,84,0.9)); }
.plan-row-badge { position: absolute; top: -10px; right: 14px; background: var(--orange); color: white; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
[dir="rtl"] .plan-row-badge { right: auto; left: 14px; }
.plan-row-icon { font-size: 24px; flex-shrink: 0; }
.plan-row-info { flex: 1; }
.plan-row-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--cream); margin-bottom: 2px; }
.plan-row-desc { font-size: 11.5px; color: rgba(253,246,236,0.4); line-height: 1.4; }
.plan-row-price { font-size: 16px; font-weight: 700; color: var(--orange); text-align: right; flex-shrink: 0; }
.plan-row-price small { font-size: 10px; color: rgba(253,246,236,0.3); font-weight: 400; display: block; text-align: right; }

/* ══ FINAL CTA ══ */
.final-cta { background: linear-gradient(135deg, var(--navy3), var(--navy2)); padding: 48px 24px 56px; text-align: center; border-top: 1px solid var(--border); }
.final-cta-lowie { width: 80px; height: 80px; object-fit: contain; margin-bottom: 16px; filter: drop-shadow(0 6px 16px rgba(244,124,58,0.3)); }
.final-cta-title { font-family: 'Playfair Display', serif; font-size: clamp(24px, 6vw, 34px); font-weight: 900; color: var(--cream); margin-bottom: 10px; line-height: 1.2; }
.final-cta-title .accent { color: var(--orange); }
.final-cta-sub { font-size: 14px; color: rgba(253,246,236,0.5); margin-bottom: 28px; line-height: 1.5; }
.final-cta-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, var(--orange), #f4a020); border: none; border-radius: 16px; color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none; box-shadow: 0 8px 28px rgba(244,124,58,0.4); transition: all 0.22s; }
.final-cta-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(244,124,58,0.5); }

/* ══ FOOTER ══ */
footer { background: var(--navy); border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; }
.footer-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: rgba(253,246,236,0.5); margin-bottom: 6px; }
.footer-logo span { color: var(--orange); }
.footer-note { font-size: 11px; color: rgba(253,246,236,0.22); line-height: 1.5; }

/* ══ MODAL ══ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box { background: var(--navy2); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 32px 24px 28px; width: 100%; max-width: 340px; transform: scale(0.92); transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); position: relative; }
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: rgba(253,246,236,0.3); font-size: 20px; cursor: pointer; line-height: 1; }
[dir="rtl"] .modal-close { right: auto; left: 18px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--cream); margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: rgba(253,246,236,0.45); margin-bottom: 22px; line-height: 1.5; }
.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(253,246,236,0.35); margin-bottom: 6px; }
.form-input { width: 100%; padding: 13px 15px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--cream); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color var(--ease); }
.form-input:focus { border-color: var(--orange); }
.form-input::placeholder { color: rgba(253,246,236,0.2); }
.btn-modal { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--orange), #f4a020); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; transition: all var(--ease); box-shadow: 0 4px 16px rgba(244,124,58,0.3); }
.btn-modal:hover { box-shadow: 0 6px 22px rgba(244,124,58,0.45); }
.modal-switch { text-align: center; margin-top: 16px; font-size: 12px; color: rgba(253,246,236,0.35); }
.modal-switch a { color: var(--orange); font-weight: 700; cursor: pointer; text-decoration: none; }
.modal-lowie { width: 56px; height: 56px; object-fit: contain; display: block; margin: 0 auto 14px; }
</style>
</head>

let currentLang = localStorage.getItem('slaagnl_lang') || 'es';

function setLang(lang) {
  if (!LANGS.includes(lang)) return;
  currentLang = lang;
  localStorage.setItem('slaagnl_lang', lang);
  applyLang();
}

function setText(id, html, isHTML) {
  const el = document.getElementById(id);
  if (!el) return;
  if (isHTML) el.innerHTML = html; else el.textContent = html;
}

function applyLang() {
  const t = T[currentLang] || T.es;
  const isRTL = currentLang === 'ar';
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;

  LANGS.forEach(l => {
    const btn = document.getElementById('lb-' + l);
    if (btn) btn.classList.toggle('active', l === currentLang);
  });

  setText('top-login', t.topLogin);
  setText('hero-badge', t.badge);
  setText('hero-title', t.heroTitle, true);
  setText('hero-sub', t.heroSub);
  setText('btn-test', t.btnTest);
  setText('btn-register', t.btnRegister);
  setText('link-login', t.linkLogin);
  setText('et-modal-title', t.etModalTitle);
  setText('et-modal-sub', t.etModalSub);
  setText('et-modal-name1', t.etName1);
  setText('et-modal-desc1', t.etDesc1);
  setText('et-modal-name2', t.etName2);
  setText('et-modal-desc2', t.etDesc2);
  setText('et-modal-soon', t.etSoon);
  setText('hero-note', t.heroNote);
  setText('feat-label', t.featLabel);
  setText('feat-title', t.featTitle, true);
  setText('f1name', t.f1name); setText('f1desc', t.f1desc);
  setText('f2name', t.f2name); setText('f2desc', t.f2desc);
  setText('f3name', t.f3name); setText('f3desc', t.f3desc);
  setText('f4name', t.f4name); setText('f4desc', t.f4desc);
  setText('f5name', t.f5name); setText('f5desc', t.f5desc);
  setText('f6name', t.f6name); setText('f6desc', t.f6desc);
  setText('f7name', t.f7name); setText('f7desc', t.f7desc);
  setText('exam-label', t.examLabel);
  setText('exam-title', t.examTitle);
  setText('pill1sub', t.pill1sub); setText('pill2sub', t.pill2sub); setText('pill3sub', t.pill3sub);
  setText('stat-a', t.statA); setText('stat-m', t.statM); setText('stat-e', t.statE);
  setText('test-label', t.testLabel); setText('test-title', t.testTitle);
  setText('test1', t.test1); setText('test2', t.test2); setText('test3', t.test3);
  setText('plan-label', t.planLabel); setText('plan-title', t.planTitle);
  setText('p1name', t.p1name); setText('p1desc', t.p1desc); setText('p1per', t.p1per);
  setText('p2name', t.p2name); setText('p2desc', t.p2desc); setText('p2per', t.p2per);
  setText('p3name', t.p3name); setText('p3desc', t.p3desc); setText('p3per', t.p3per); setText('p3badge', t.p3badge);
  setText('plan-btn', t.planBtn);
  setText('cta-title', t.ctaTitle, true); setText('cta-sub', t.ctaSub); setText('cta-btn', t.ctaBtn);
  setText('foot-note', t.footNote);
  setText('reg-title', t.regTitle); setText('reg-sub', t.regSub);
  setText('reg-l-name', t.regLName); document.getElementById('reg-name').placeholder = t.regPName;
  setText('reg-l-email', t.regLEmail); document.getElementById('reg-email').placeholder = t.regPEmail;
  setText('reg-l-pass', t.regLPass); document.getElementById('reg-pass').placeholder = t.regPPass;
  setText('reg-btn', t.regBtn); setText('reg-switch', t.regSwitch); setText('reg-switch-a', t.regSwitchA);

  setText('log-l-pass', t.logLPass); document.getElementById('log-pass').placeholder = t.logPPass;
  setText('log-btn', t.logBtn); setText('log-switch', t.logSwitch); setText('log-switch-a', t.logSwitchA);
}

function openRegister() { closeModals(); document.getElementById('modal-register').classList.add('open'); }
function openLogin()    { closeModals(); document.getElementById('modal-login').classList.add('open'); }
function openExamType() { closeModals(); document.getElementById('modal-exam-type').classList.add('open'); }
function selectExamType(type) { localStorage.setItem('slaagnl_exam_type', type); window.location.href = 'dashboard.html'; }
function closeModals()  { document.getElementById('modal-register').classList.remove('open'); document.getElementById('modal-login').classList.remove('open'); document.getElementById('modal-exam-type').classList.remove('open'); }
function switchToLogin()    { openLogin(); }
function switchToRegister() { openRegister(); }

document.getElementById('modal-register').addEventListener('click', function(e) { if (e.target === this) closeModals(); });
document.getElementById('modal-exam-type').addEventListener('click', function(e) { if (e.target === this) closeModals(); });
document.getElementById('modal-login').addEventListener('click', function(e) { if (e.target === this) closeModals(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

function doRegister() {
  const t = T[currentLang] || T.es;
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  if (!name)        { alert(t.aName);  return; }
  if (!email)       { alert(t.aEmail); return; }
  if (pass.length < 6) { alert(t.aPass); return; }
  localStorage.setItem('slaagnl_name',  name);
  localStorage.setItem('slaagnl_email', email);
  localStorage.setItem('slaagnl_plan',  'libre');
  localStorage.setItem('slaagnl_streak', '0');
  openExamType();
}

function doLogin() {
  const t = T[currentLang] || T.es;
  const email = document.getElementById('log-email').value.trim();
  const pass  = document.getElementById('log-pass').value;
  if (!email) { alert(t.aEmail); return; }
  if (!pass)  { alert(t.aPassL); return; }
  const savedEmail = localStorage.getItem('slaagnl_email');
  if (savedEmail && savedEmail !== email) {
    if (!confirm(t.aConfirm)) return;
  }
  const examType = localStorage.getItem('slaagnl_exam_type');
  if (examType) { window.location.href = 'dashboard.html'; } else { openExamType(); }
}

document.addEventListener('DOMContentLoaded', () => applyLang());
</script>
