let testQuestions = [];
let answers = [];
let currentQ = 0;
let timerInterval = null;
let testFinished = false;

let speechReady = false;
let selectedVoice = null;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function pickTestQuestions(){
  return shuffle(QUESTION_BANK).slice(0, TEST_SIZE);
}

function initTest(){
  testQuestions = pickTestQuestions();
  answers = new Array(TEST_SIZE).fill(null);
  currentQ = 0;
  testFinished = false;

  buildQNav();
  renderQ(0);
  startTimer();
  initSpeech();
}

function startTimer(){
  let s = TOTAL_MINUTES * 60;
  timerInterval = setInterval(()=>{
    s--;
    if(s===5*60) showTimerToast('⏰ Nog 5 minuten');
    if(s===60)   showTimerToast('⚠️ Nog 1 minuut');
    if(s<=0){clearInterval(timerInterval);finishTest();}
  },1000);
}

function showTimerToast(msg){
  const el=document.getElementById('timer-toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),5000);
}

function buildQNav(){
  const nav=document.getElementById('qnav');nav.innerHTML='';
  testQuestions.forEach((_,i)=>{
    const btn=document.createElement('button');
    btn.className='qnum'+(i===0?' current':'');
    btn.id=`qnum-${i}`;
    btn.textContent=i+1;
    btn.onclick=()=>goToQ(i);
    nav.appendChild(btn);
  });
}

function updateQNav(){
  testQuestions.forEach((_,i)=>{
    const btn=document.getElementById(`qnum-${i}`);if(!btn)return;
    btn.className='qnum';
    if(answers[i]!==null)btn.classList.add('answered');
    if(i===currentQ)btn.classList.add('current');
  });
  const btn=document.getElementById(`qnum-${currentQ}`);
  if(btn)btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function loadImageFlexible(imgBase){
  const img = document.getElementById('kns-img');
  const fb = document.getElementById('img-fallback');
  fb.style.display='none';
  img.style.display='block';

  const jpg = ASSET_DIR + imgBase + '.jpg';
  const png = ASSET_DIR + imgBase + '.png';

  img.onerror = () => {
    if (img.dataset.tried !== 'png') {
      img.dataset.tried = 'png';
      img.src = png;
      return;
    }
    img.style.display='none';
    fb.style.display='block';
    fb.textContent = jpg + ' / ' + png;
  };

  img.dataset.tried = 'jpg';
  img.src = jpg;
}

function renderQ(idx, speak=true){
  currentQ=idx;
  const q=testQuestions[idx];
  document.getElementById('hdr-count').textContent=`${idx+1} / ${TEST_SIZE}`;

  loadImageFlexible(q.imgBase);

  const labels=['A','B'];
  const optsHtml=q.opts.map((opt,oi)=>{
    const sel=answers[idx]===oi?'selected':'';
    return `<div class="opt ${sel}" onclick="selectOpt(${oi})">
      <div class="opt-label">${labels[oi]||''}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  document.getElementById('q-card').innerHTML=`
    <div class="q-header">
      <span class="q-num-badge">P${idx+1}</span>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="q-opts">${optsHtml}</div>`;

  document.getElementById('btn-prev').style.display=idx===0?'none':'flex';
  document.getElementById('btn-next-q').textContent=idx===TEST_SIZE-1?'Laatste':'Volgende ›';
  updateQNav();

  if(speak) speakCurrent();
}

function selectOpt(oi){
  if(testFinished)return;
  answers[currentQ]=oi;
  renderQ(currentQ, false);
}

function goQ(dir){
  const next=currentQ+dir;
  if(next<0||next>=TEST_SIZE)return;
  renderQ(next);
}
function goToQ(idx){renderQ(idx);}

function confirmFinish(){
  const u=answers.filter(a=>a===null).length;
  document.getElementById('modal-title').textContent='Examen afronden?';
  document.getElementById('modal-sub').textContent=u>0?`Je hebt ${u} vraag${u>1?'en':''} niet beantwoord.`:'Weet je het zeker?';
  document.getElementById('modal-confirm-btn').textContent='Afronden';
  document.getElementById('modal-confirm-btn').onclick=finishTest;
  document.getElementById('confirm-modal').classList.add('open');
}

function confirmExit(){
  document.getElementById('modal-title').textContent='Examen verlaten?';
  document.getElementById('modal-sub').textContent='Je voortgang gaat verloren.';
  document.getElementById('modal-confirm-btn').textContent='Verlaten';
  document.getElementById('modal-confirm-btn').onclick=()=>window.location.href='../dashboard.html';
  document.getElementById('confirm-modal').classList.add('open');
}

function closeModal(){document.getElementById('confirm-modal').classList.remove('open');}

function finishTest(){
  clearInterval(timerInterval);
  testFinished=true;
  closeModal();
  stopSpeech();

  let correct=0;
  testQuestions.forEach((q,i)=>{if(answers[i]===q.correct)correct++;});
  const pct=Math.round(correct/TEST_SIZE*100);
  const pass=pct>=70;

  document.getElementById('main-content').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('qnav-wrap').style.display='none';

  const rs=document.getElementById('results-screen');
  rs.innerHTML=`
    <div class="results-emoji">${pass?'🎉':'📚'}</div>
    <div class="results-title">${pass?'Geslaagd!':'Blijf oefenen'}</div>
    <div class="results-score">${pct}%</div>
    <div class="results-bar-wrap"><div class="results-bar ${pass?'pass':'fail'}" style="width:${pct}%"></div></div>
    <div class="results-verdict ${pass?'pass':'fail'}">${pass?'✓ Behaald — minimaal 70%':'✗ Niet behaald — minimaal 70%'}</div>
    <div class="results-breakdown">
      <div class="breakdown-row"><span class="breakdown-label">Goed</span><span class="breakdown-val ok">${correct} / ${TEST_SIZE}</span></div>
      <div class="breakdown-row"><span class="breakdown-label">Fout / leeg</span><span class="breakdown-val err">${TEST_SIZE-correct}</span></div>
      <div class="breakdown-row"><span class="breakdown-label">Score</span><span class="breakdown-val">${pct}%</span></div>
    </div>
    <button class="btn-back-home" onclick="window.location.href='../dashboard.html'" style="background:linear-gradient(135deg,var(--orange),#e8702f);color:white;border:none;padding:16px 24px;border-radius:14px;font-weight:900;font-size:15px;box-shadow:0 6px 20px rgba(244,124,58,0.35);">🏠 Terug naar je dashboard</button>`;
  rs.classList.add('show');
}

function initSpeech(){
  if(!('speechSynthesis' in window)) return;
  const trySelect = () => {
    const voices = window.speechSynthesis.getVoices();
    if(!voices || voices.length===0) return false;
    selectedVoice =
  voices.find(v => /^nl/i.test(v.lang) && /(google|microsoft|natural|neural)/i.test(v.name)) ||
  voices.find(v => /^nl/i.test(v.lang) && v.localService) ||
  voices.find(v => /^nl/i.test(v.lang)) ||
  null;
    speechReady = true;
    return true;
  };
  if(!trySelect()){
    window.speechSynthesis.onvoiceschanged = () => { trySelect(); };
  }
}

function stopSpeech(){
  if(!('speechSynthesis' in window)) return;
  try { window.speechSynthesis.cancel(); } catch(e){}
}

function buildSpeakText(){
  const q = testQuestions[currentQ];
  const A = q.opts[0] ?? '';
  const B = q.opts[1] ?? '';
  return `${q.q}. A: ${A}. B: ${B}.`;
}

function speakCurrent(){
  if(!('speechSynthesis' in window)) return;
  stopSpeech();

  const text = buildSpeakText();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'nl-NL';
  u.rate = 0.65;
  u.pitch = 1.0;
  u.volume = 1.0;
  if(selectedVoice) u.voice = selectedVoice;

  try { window.speechSynthesis.speak(u); } catch(e){}
}

function reSpeak(){ speakCurrent(); }

initTest();
</script>
